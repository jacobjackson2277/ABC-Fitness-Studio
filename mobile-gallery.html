<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mobile Gallery</title>
<link href="styles.css" rel="stylesheet"/>
</head>
<body class="mobile-layout">
<header class="site-header">
<div class="logo">ABC Fitness Studio</div>
<nav class="site-nav">
<a href="mobile-home.html">Home</a>
<a href="mobile-gallery.html">Gallery</a>
<a href="mobile-about.html">About Us</a>
<a href="mobile-contact.html">Contact</a>
</nav>
</header>
<main>

<section class="section-box gallery-grid">
<h2>Our Classes</h2>
<div class="gallery-item">
<img alt="Individual yoga session" class="gallery-image" src="images/individual-yoga-session.jpg"/>
<p class="gallery-description">Individual yoga session</p>
<button onclick="addToCart('Individual yoga session')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Group yoga session" class="gallery-image" src="images/group-yoga-session.jpg"/>
<p class="gallery-description">Group yoga session</p>
<button onclick="addToCart('Group yoga session')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Individual Pilates session" class="gallery-image" src="images/individual-pilates-session.jpg"/>
<p class="gallery-description">Individual Pilates session</p>
<button onclick="addToCart('Individual Pilates session')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Group Pilates session" class="gallery-image" src="images/group-pilates-session.jpg"/>
<p class="gallery-description">Group Pilates session</p>
<button onclick="addToCart('Group Pilates session')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Individual kickboxing session" class="gallery-image" src="images/individual-kickboxing-session.jpg"/>
<p class="gallery-description">Individual kickboxing session</p>
<button onclick="addToCart('Individual kickboxing session')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Group kickboxing session" class="gallery-image" src="images/group-kickboxing-session.jpg"/>
<p class="gallery-description">Group kickboxing session</p>
<button onclick="addToCart('Group kickboxing session')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Yoga mat" class="gallery-image" src="images/yoga-mat.jpg"/>
<p class="gallery-description">Yoga mat</p>
<button onclick="addToCart('Yoga mat')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Water bottle" class="gallery-image" src="images/water-bottle.jpg"/>
<p class="gallery-description">Water bottle</p>
<button onclick="addToCart('Water bottle')">Add to Cart</button>
</div>
<div class="gallery-item">
<img alt="Tee shirt" class="gallery-image" src="images/tee-shirt.jpg"/>
<p class="gallery-description">Tee shirt</p>
<button onclick="addToCart('Tee shirt')">Add to Cart</button>
</div>
</section><div class="cart-actions"><button onclick="viewCart()">View Cart</button><button onclick="clearCartAlert()">Clear Cart</button><button onclick="processOrderAlert()">Process Order</button></div>
</main>
<footer class="site-footer"><p>ABC Fitness Studio</p><button onclick="subscribeAlert()">Subscribe</button></footer>
<script>

function showSiteMessage(message) {
  const existing = document.querySelector('.custom-message-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'custom-message-overlay';

  const box = document.createElement('div');
  box.className = 'custom-message-box';

  const text = document.createElement('p');
  text.textContent = message;

  const closeButton = document.createElement('button');
  closeButton.textContent = 'OK';
  closeButton.addEventListener('click', function () {
    overlay.remove();
  });

  box.appendChild(text);
  box.appendChild(closeButton);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function subscribeAlert() {
  showSiteMessage('Thank you for subscribing.');
}

function getCartItems() {
  return JSON.parse(sessionStorage.getItem('abcFitnessCart')) || [];
}

function saveCartItems(cartItems) {
  sessionStorage.setItem('abcFitnessCart', JSON.stringify(cartItems));
}

function addToCart(itemName) {
  const cartItems = getCartItems();
  const existingItem = cartItems.find(function (item) {
    return item.name === itemName;
  });

  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cartItems.push({ name: itemName, quantity: 1 });
  }

  saveCartItems(cartItems);
  showSiteMessage(itemName + ' added to the cart.');
}

function addCartAlert(itemName) {
  addToCart(itemName || 'Item');
}

function viewCart() {
  const cartItems = getCartItems();
  const existing = document.querySelector('.cart-modal-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'cart-modal-overlay';

  const box = document.createElement('div');
  box.className = 'cart-modal-box';

  const heading = document.createElement('h2');
  heading.textContent = 'Shopping Cart';
  box.appendChild(heading);

  if (cartItems.length === 0) {
    const emptyMessage = document.createElement('p');
    emptyMessage.textContent = 'Your cart is empty.';
    box.appendChild(emptyMessage);
  } else {
    const list = document.createElement('ul');
    list.className = 'cart-list';

    cartItems.forEach(function (item) {
      const listItem = document.createElement('li');
      listItem.textContent = item.name + ' - Quantity: ' + item.quantity;
      list.appendChild(listItem);
    });

    box.appendChild(list);
  }

  const closeButton = document.createElement('button');
  closeButton.textContent = 'Close';
  closeButton.addEventListener('click', function () {
    overlay.remove();
  });

  box.appendChild(closeButton);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function clearCartAlert() {
  sessionStorage.removeItem('abcFitnessCart');
  showSiteMessage('Cart cleared.');
}

function processOrderAlert() {
  sessionStorage.removeItem('abcFitnessCart');
  showSiteMessage('Thank you for your order.');
}

function clearContactErrors() {
  document.querySelectorAll('.error-message').forEach(function (error) {
    error.textContent = '';
  });
}

function setError(id, message) {
  const errorElement = document.getElementById(id);
  if (errorElement) {
    errorElement.textContent = message;
  }
}

function messageAlert(event) {
  if (event) event.preventDefault();

  clearContactErrors();

  const nameInput = document.getElementById('contactName');
  const emailInput = document.getElementById('contactEmail');
  const messageInput = document.getElementById('contactMessage');

  if (!nameInput || !emailInput || !messageInput) {
    showSiteMessage('Thank you for your message.');
    return;
  }

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const message = messageInput.value.trim();
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  let isValid = true;

  if (name === '') {
    setError('nameError', 'Please enter your name.');
    isValid = false;
  }

  if (email === '') {
    setError('emailError', 'Please enter your email address.');
    isValid = false;
  } else if (!emailPattern.test(email)) {
    setError('emailError', 'Please enter a valid email address.');
    isValid = false;
  }

  if (message === '') {
    setError('messageError', 'Please enter a message.');
    isValid = false;
  }

  if (!isValid) {
    return;
  }

  const contactSubmissions = JSON.parse(localStorage.getItem('abcFitnessContactSubmissions')) || [];
  contactSubmissions.push({
    name: name,
    email: email,
    message: message,
    submittedAt: new Date().toLocaleString()
  });
  localStorage.setItem('abcFitnessContactSubmissions', JSON.stringify(contactSubmissions));

  showSiteMessage('Thank you for your message.');
  nameInput.value = '';
  emailInput.value = '';
  messageInput.value = '';
}

</script></body>
</html>
